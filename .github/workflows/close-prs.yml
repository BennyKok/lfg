name: close-prs

# This repo does not accept pull requests — close them automatically with a
# polite note. GitHub has no setting to disable PRs on a public repo, so this
# bot is the enforcement.
#
# SECURITY: pull_request_target runs with repo-scoped credentials, which is
# safe here ONLY because this job never checks out or executes PR code — it
# makes a single API call. Do not add a checkout step to this workflow.

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - name: Close pull request
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr comment "$PR" --repo "$REPO" --body \
            "Thanks for your interest! This repository does not accept pull requests — it is developed on a private mainline and published here. Please open an issue instead to report bugs or suggest changes."
          gh pr close "$PR" --repo "$REPO"
